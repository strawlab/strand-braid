[package]
name = "ci2-simple-async-demo"
version = "0.1.0"
authors = ["Andrew Straw <strawman@astraw.com>"]
edition = "2024"
license = "MIT OR Apache-2.0"
description = "simple demonstration of the ci2 asynchronous camera API"

[dependencies]
tracing.workspace = true
env_logger.workspace = true
futures.workspace = true
anyhow.workspace = true
lazy_static.workspace = true

machine-vision-formats.workspace = true
ci2.workspace = true
ci2-async.workspace = true

pylon-shimload = { workspace = true, optional = true }
ci2-pylon = { workspace = true, optional = true }
ci2-pylon-types = { workspace = true, optional = true }

ci2-vimba = { workspace = true, optional = true }
ci2-vimba-types = { workspace = true, optional = true }

[features]
default = ["backend_pylon"]

# Backend choice
backend_pylon = ["dep:ci2-pylon", "dep:pylon-shimload", "dep:ci2-pylon-types"]
backend_vimba = ["dep:ci2-vimba", "dep:ci2-vimba-types"]
