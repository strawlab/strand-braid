[package]
name = "opencv-calibrate"
license = "MIT/Apache-2.0"
version = "0.1.0"
authors = ["Andrew Straw <strawman@astraw.com>"]
edition = "2024"
description = "Rust bindings to OpenCV camera calibration routines"

[dependencies]

[build-dependencies]
pkg-config = "0.3.26"
cc = "1.1.12"

# NOTE: this crate is excluded from the workspace (it requires OpenCV), so
# dependencies are specified explicitly rather than inherited from the
# workspace.
[dev-dependencies]
approx = "0.5"
image = { version = "0.25.6", default-features = false, features = [
    "bmp",
    "jpeg",
    "png",
    "tiff",
] }
serde_json = "1.0.142"

calib3d-rs = { path = "../calib3d-rs" }
