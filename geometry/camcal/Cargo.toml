[package]
name = "camcal"
license = "MIT OR Apache-2.0"
version = "0.1.0"
authors = ["Andrew Straw <strawman@astraw.com>"]
edition = "2024"
description = "camera calibration utilities using checkerboard patterns"

[dependencies]
nalgebra.workspace = true
opencv-ros-camera.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_yaml.workspace = true
chrono.workspace = true
eyre.workspace = true

checkerboard-calibrate.workspace = true
opencv-calibrate = { workspace = true, optional = true }

[features]
default = []
# Escape hatch: route chessboard detection and calibration through the OpenCV
# C++ implementation instead of the default pure-Rust `checkerboard-calibrate`.
opencv = ["dep:opencv-calibrate"]
