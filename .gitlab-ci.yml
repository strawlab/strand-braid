variables:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

cache:
  key: there-is-no-cache
  policy: pull

check_and_test_workspace:
  image: gitlab.strawlab.org:4567/straw/rust-cam/focal-base:0.0.6
  dependencies: []
  script:
    - _packaging/setup-ubuntu-apt-proxy.sh
    - export RUSTFLAGS="-D warnings"

    # Install prerequisites
    - apt-get -y update && DEBIAN_FRONTEND=noninteractive apt-get install -y ffmpeg

    # Do a cargo check on the whole workspace to make sure all crates compile
    # with default features.
    - cd $CI_PROJECT_DIR

    # Populate the cargo cache with the FULL dependency graph BEFORE any build
    # that triggers the strand-cam / braid-run build scripts. Those build scripts
    # invoke `trunk` to build their Yew/WASM frontends, and that nested cargo runs
    # offline (CARGO_NET_OFFLINE=true) to avoid deadlocking the outer build's
    # package-cache lock (see build-util::trunk_build). Trunk first runs `cargo
    # metadata`, which resolves the whole workspace graph for *every* platform --
    # including crates gated to other targets (e.g. the macOS-only accesskit_macos
    # pulled in by the GUI stack). Offline, any package missing from the cache
    # aborts that metadata call, so a wasm32-only fetch is not enough. Plain
    # `cargo fetch` downloads the entire graph for all targets.
    - cargo fetch

    # This is basically what rust analyzer does.
    - cargo check --workspace --all-targets

    # Ensure all files have license
    - cargo run -p license-check

    # Run all tests.
    - cargo test --release --workspace --all-targets

test_crates:
  image: gitlab.strawlab.org:4567/straw/rust-cam/focal-base:0.0.6
  dependencies: []
  script:
    - export RUSTFLAGS="-D warnings"

    - DEBIAN_FRONTEND=noninteractive apt-get install -y ffmpeg

    # Test bundle-adj
    - cd $CI_PROJECT_DIR/geometry/bundle-adj
    - cargo test --release --features with-rerun

    # Test braid-april-cal-cli
    - cd $CI_PROJECT_DIR/geometry/braid-april-cal/braid-april-cal-cli
    - cargo test --release --features with-rerun -- --nocapture

    - cd $CI_PROJECT_DIR

    # Test freemovr-calibration
    - cd geometry/freemovr-calibration
    - cargo test --release
    - cd ../..

    # Test strand-cam-offline-checkerboards
    - cd strand-cam/strand-cam-offline-checkerboards
    - cargo test --release
    - cd ../..

    # Test freemovr-calibration-cli
    - cd geometry/freemovr-calibration/freemovr-calibration-cli
    - cargo build

test_flydra2:
  dependencies: []
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  image: ubuntu:noble
  script:
    - _packaging/setup-ubuntu-base.sh
    # Put cargo and rust on the path
    - . "$HOME/.cargo/env"

    # Install python and pip, but let pip install everything from there.
    - apt-get -y update && DEBIAN_FRONTEND=noninteractive apt install -y python3-full python3-pip python-is-python3 libcairo2-dev

    # Create venv
    - python3 -m venv $CI_PROJECT_DIR/flydra2env

    # Install flydra from pip
    - $CI_PROJECT_DIR/flydra2env/bin/python -m pip install flydra_core
    - $CI_PROJECT_DIR/flydra2env/bin/python -m pip install flydra_analysis

    # Install required python packages
    - $CI_PROJECT_DIR/flydra2env/bin/python -m pip install imageio

    - export RUSTFLAGS="-D warnings"

    - cargo build -p braid-offline --release
    - cd $CI_PROJECT_DIR/braid/braid-offline
    # test 3D retracking
    - PATH="$CI_PROJECT_DIR/flydra2env/bin:$CI_PROJECT_DIR/target/release:$PATH" cargo test --release -- --include-ignored
    # test 2D retracking
    - PATH="$CI_PROJECT_DIR/flydra2env/bin:$CI_PROJECT_DIR/target/release:$PATH" cargo run --no-default-features --features "flydra2/bundle_files" --bin braid-offline-retrack --release -- -d test_data/20180330_113743.short -o /tmp/k2d.braidz
    # run retracking script
    - MPLBACKEND=AGG PATH="$CI_PROJECT_DIR/flydra2env/bin:$PATH" ./test_data/retrack-demo.sh
    # TODO: test 3D retracking using `rust-cam-testing-data`
    # cargo run --bin braid-offline-retrack -- -d ..\..\rust-cam-testing-data\20200622_111457.braid -o tmp

check_repository_source:
  dependencies: []
  image: rust:1.95
  script:
    - rustup component add rustfmt

    # Test that code is formatted correctly
    - cargo fmt --check

    # Test that README.md is up to date
    - cargo run -p workspace-docs -- --check

check_generated_bundle_adj_code:
  dependencies: []
  image: astral/uv:python3.14-trixie
  script:
    - cd geometry/bundle-adj/codegen && ./regenerate.sh
    - git diff --exit-code

# Verify the strand-braid THIRD-PARTY-LICENSES crate list is up to date: every
# listed crate exists, and every binary shipped by strand-braid.install is
# produced by a crate on the list. The third-party-licenses job below additionally
# runs the generator itself (cargo bundle-licenses) on every pipeline.
check_third_party_licenses:
  dependencies: []
  image: rust:1.95
  script:
    - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y python3
    - _packaging/check-strand-braid-third-party-licenses.sh

test_crates_rust_stable:
  dependencies: []
  image: rust:1.95
  script:
    # Fail on any compiler warnings.
    - export RUSTFLAGS="-D warnings"

    # Install LLVM and clang for crates which require a C compiler.
    - cd $CI_PROJECT_DIR
    - _packaging/setup-ubuntu-apt-proxy.sh
    - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y llvm-dev libclang-dev clang

    - rustup target add thumbv7em-none-eabihf

    # Test mvg
    - cd $CI_PROJECT_DIR/geometry/braid-mvg
    - cargo test --all-features

    # strand-dynamic-frame
    - cd $CI_PROJECT_DIR
    - cargo test -p strand-dynamic-frame --features convert-image

    # strand-cam
    - cd strand-cam
    - cargo test --no-default-features  --features serve_files
    - cd ..

    # Test imops
    - cargo test -p imops --no-default-features -p imops
    - cargo test -p imops --no-default-features --features std
    - cargo build -p imops --no-default-features --target thumbv7em-none-eabihf
    - cargo bench -p imops --no-run

    # Test flydra-feature-detector
    - cd $CI_PROJECT_DIR
    - cargo test -p flydra-feature-detector --release

    # Test media-utils/frame-source
    - cd media-utils/frame-source
    - cargo test --features openh264
    - cd ../..

led-box-ubuntu2004-debs:
  image: gitlab.strawlab.org:4567/straw/rust-cam/focal-base:0.0.6
  script:
    - mkdir -p $CI_PROJECT_DIR/focal-led-box-debs
    - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y dpkg-dev debhelper

    - cargo install cargo-bundle-licenses --locked
    - $CI_PROJECT_DIR/_packaging/gen-third-party-licenses.sh $CI_PROJECT_DIR/led-box/led-box led-box/led-box
    - mv $CI_PROJECT_DIR/led-box/led-box/THIRD-PARTY-LICENSES.led-box.yml $CI_PROJECT_DIR/led-box/led-box/THIRD-PARTY-LICENSES.yml

    - cd $CI_PROJECT_DIR/led-box/led-box
    - cp $CI_PROJECT_DIR/build/led-box ./
    - cp $CI_PROJECT_DIR/led-box-firmware-${CI_COMMIT_SHA}.bin ./led-box-firmware.bin
    - dpkg-buildpackage -rfakeroot -b -uc -us
    - cd ..
    - cp -a led-box*.changes $CI_PROJECT_DIR/focal-led-box-debs/
    - cp -a led-box*.deb $CI_PROJECT_DIR/focal-led-box-debs/
  needs:
    - led-box-linux
    - led-box-firmware
  artifacts:
    paths:
      - focal-led-box-debs/
    name: "rust-cam-focal-led-box-debs-${CI_COMMIT_SHA}"

led-box-standalone-ubuntu2004-deb:
  dependencies: []
  image: gitlab.strawlab.org:4567/straw/rust-cam/focal-base:0.0.6
  script:
    - mkdir -p $CI_PROJECT_DIR/led-box-standalone-debs
    - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y dpkg-dev debhelper libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev cmake pkg-config libfontconfig-dev

    - cargo install cargo-bundle-licenses --locked
    - $CI_PROJECT_DIR/_packaging/gen-third-party-licenses.sh $CI_PROJECT_DIR/led-box/led-box-standalone led-box/led-box-standalone
    - mv $CI_PROJECT_DIR/led-box/led-box-standalone/THIRD-PARTY-LICENSES.led-box-standalone.yml $CI_PROJECT_DIR/led-box/led-box-standalone/THIRD-PARTY-LICENSES.yml

    - cd $CI_PROJECT_DIR/led-box/led-box-standalone
    - cargo build --release
    - cp $CI_PROJECT_DIR/target/release/led-box-standalone ./
    - dpkg-buildpackage -rfakeroot -b -uc -us
    - cd ..
    - cp -a led-box-standalone*.changes $CI_PROJECT_DIR/led-box-standalone-debs/
    - cp -a led-box-standalone*.deb $CI_PROJECT_DIR/led-box-standalone-debs/
  artifacts:
    paths:
      - led-box-standalone-debs/
    name: "led-box-standalone-debs-${CI_COMMIT_SHA}"

build-freemovr-calibration:
  dependencies: []
  image: rust:1.95
  script:
    - export RUSTFLAGS="-D warnings"
    - cd geometry/freemovr-calibration/freemovr-calibration-cli
    - cargo build --release
    - mkdir -p $CI_PROJECT_DIR/freemovr-cal-linux
    - ldd ../../../target/release/freemovr-calibration
    - ls -lh ../../../target/release/freemovr-calibration
    - cp -a ../../../target/release/freemovr-calibration $CI_PROJECT_DIR/freemovr-cal-linux
  artifacts:
    paths:
      - freemovr-cal-linux
    name: "freemovr-cal-linux-${CI_COMMIT_SHA}"

build-freemovr-calibration-webapp:
  dependencies: []
  image: rust:1.95
  script:
    - export RUSTFLAGS="-D warnings"
    - export CARGO_HOME="$CI_PROJECT_DIR/.cargo-proj"
    - export PATH="$PATH:$CARGO_HOME/bin"
    - echo $PATH
    - rustup target add wasm32-unknown-unknown

    - curl --location --remote-name https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-musl.tar.gz
    - tar xzf trunk-x86_64-unknown-linux-musl.tar.gz
    - mkdir -p $CARGO_HOME/bin/
    - mv trunk $CARGO_HOME/bin/
    - trunk --version

    - cd geometry/freemovr-calibration/freemovr-calibration-webapp
    - ./build.sh
    - mkdir -p $CI_PROJECT_DIR/freemovr-cal-webapp
    - cp -a dist/* $CI_PROJECT_DIR/freemovr-cal-webapp
  artifacts:
    paths:
      - freemovr-cal-webapp
    name: "freemovr-cal-webapp-${CI_COMMIT_SHA}"

