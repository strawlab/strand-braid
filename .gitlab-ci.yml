      - led-box-firmware-${CI_COMMIT_SHA}.bin
    name: "led-box-firmware-${CI_COMMIT_SHA}"

# -------

# Generate per-crate THIRD-PARTY-LICENSES.<crate>.yml files for every crate
# whose binary ships in the strand-braid bundle. Output is placed in
# build/licenses/ so the existing _packaging Makefile (which `mv`s build/*
# into the debian source tree) picks them up automatically. Each
# strand-braid-ubuntu-XXXX job below adds this job to its `needs:` list.
third-party-licenses:
  image: rust:1.95
  dependencies: []
  script:
    - cargo install cargo-bundle-licenses --locked
    - _packaging/gen-strand-braid-third-party-licenses.sh $CI_PROJECT_DIR/build/licenses
    - ls -lh $CI_PROJECT_DIR/build/licenses
  artifacts:
    paths:
      - build/
    name: "strand-braid-third-party-licenses-${CI_COMMIT_SHA}"

build_simple:
  dependencies: []
  image: gitlab.strawlab.org:4567/straw/rust-cam/focal-base:0.0.6
  script:
    # Pre-fetch the full dependency graph so the strand-cam / braid-run build
    # scripts' nested, offline trunk frontend build finds every package in the
    # cargo cache -- its `cargo metadata` resolves the whole workspace for all
    # platforms (see build-util::trunk_build; same rationale as in
    # check_and_test_workspace).
    - cd $CI_PROJECT_DIR
    - cargo fetch

    # Build strand-cam with simplest build configuration possible
    - cd $CI_PROJECT_DIR/strand-cam
    - cargo build --release --bin strand-cam

    # Build braid-run with simplest build configuration possible
    - cd $CI_PROJECT_DIR/braid/braid-run
    - cargo build --release

# End-to-end smoke test: run the strand-cam and braid-run binaries built by
# the artifact jobs above against cameras emulated by the Basler Pylon driver
# (PYLON_CAMEMU), exercise the HTTP control API with the demo scripts from
# docs/user-docs/scripts/, and verify in the logs that the commands took
# effect. See docs/developer-docs/testing-with-emulated-cameras.md. This job
# runs only on GitLab CI (not GitHub Actions) because the Pylon SDK is
# downloaded from an internal server.
smoke_test_camemu:
  image: ubuntu:focal
  needs:
    - strand-cam-binary
    - braid-run-binary
  script:
    - _packaging/setup-ubuntu-apt-proxy.sh
    - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y curl ca-certificates
    # Install uv, which runs the smoke test's Python helpers with a pinned
    # Python version and the `requests` dependency (no system python needed).
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    # Install the Basler Pylon SDK, required at runtime for camera emulation.
    - _packaging/install-pylon-linux.sh
    # Download the Basler Pylon C-ABI shim, loaded by strand-cam at runtime.
    - curl --fail -L -o /tmp/libpylon-cabi.so "https://strawlab.org/assets/libpylon-cabi/precompiled/libpylon-cabi-v1-linux-x86_64-pylon_7.3.0.27189.so"
    - STRAND_BRAID_TARGET_DIR=$CI_PROJECT_DIR/build PYLON_CABI=/tmp/libpylon-cabi.so smoke-tests/braid-camemu.sh

test_user_guide:
  dependencies: []
  image: rust:1.95
  script:
    - cd docs/user-docs/users-guide
    - curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.18/mdbook-v0.4.18-x86_64-unknown-linux-gnu.tar.gz | tar -xz
    - ./mdbook test
