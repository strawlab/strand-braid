build-api-docs:
  dependencies: []
  image: gitlab.strawlab.org:4567/straw/rust-cam/focal-base:0.0.6
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y llvm-dev libclang-dev clang

    # Keep these autogenerated API docs out of search-engine indexes so that
    # strawlab.org is not classified as a generic Rust API documentation mirror.
    - export RUSTDOCFLAGS="--html-in-header $CI_PROJECT_DIR/_packaging/rustdoc-noindex.html"

    # build docs for braid-run
    - cd $CI_PROJECT_DIR/braid/braid-run
    - NUM_JOBS=2 cargo doc --no-default-features --features serve_files
    - cd $CI_PROJECT_DIR

    # `--no-default-features` is required because the default features now
    # include `bundle_files`, which conflicts with `serve_files`.
    - cd $CI_PROJECT_DIR/strand-cam
    - NUM_JOBS=2 cargo doc --no-default-features --features serve_files,fiducial,checkercal
    - cd $CI_PROJECT_DIR
    # remove potential old output directory
    - rm -rf build
    - mkdir build

    # rename directory
    - mv target/doc build/latest
  artifacts:
    paths:
      - build/
    name: "api-docs-${CI_COMMIT_SHA}"

stage-api-docs:
  image: ubuntu:focal
  script:
    - _packaging/setup-ubuntu-apt-proxy.sh
    - apt-get update && apt-get install -y rsync openssh-client
    - mkdir ~/.ssh
    - chmod 0700 ~/.ssh
    - echo "|1|zo8kIvGXE6Nf3WNYrk/IwXyNt18=|cMmSpBho6sRzu8Z4+LNSFAFY4L8= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBGs/hBRnah/Zi6behPr3X+wamzb6wzwj/rxQAwWX6uXwu/enV2zfyM5TzeAL3PbWXbLsb5bLumCHIDUg15UMLK8=" >> ~/.ssh/known_hosts
    - echo "|1|c1I4D0LzU1HjupN0Wc9Md1QIYVE=|ITvXx3AglaDGm8hhfahKF52hmGU= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBGs/hBRnah/Zi6behPr3X+wamzb6wzwj/rxQAwWX6uXwu/enV2zfyM5TzeAL3PbWXbLsb5bLumCHIDUg15UMLK8=" >> ~/.ssh/known_hosts
    - echo "$SSH_STRAWLAB_ORG_STAGING" > ~/.ssh/id_rsa
    - chmod go-rx ~/.ssh/id_rsa
    - rsync -az --delete build/latest/ strawlab-org-staging@strawlab-org-staging.strawlab-internal.de:strawlab-org-staging.strawlab-internal.de/strand-braid-api-docs/latest
  environment:
    name: strand-braid-api-docs-staging
    url: http://strawlab-org-staging.strawlab-internal.de/strand-braid-api-docs/latest
  needs:
    - build-api-docs

publish-api-docs:
  # To deploy API docs in the Gitlab CI userinterface for the pipeline, click on
  # this job (not the "play" button but the name of the unstarted job). This
  # will bring up a screen in which variables can be manually entered. Create a
  # variable with key STRAWLAB_ORG_SSH_PRIVATE_KEY in which the value is the SSH
  # private key for the user below. In case accidentally deployment was
  # triggered without entering the variable, delete the job log and the gitlab
  # screen will be available again.
  image: ubuntu:focal
  script:
    - _packaging/setup-ubuntu-apt-proxy.sh
    - apt-get update && apt-get install -y rsync openssh-client
    - mkdir ~/.ssh
    - chmod 0700 ~/.ssh
    - echo "|1|zYmppQbwcvSf9VwRXNIR7kmVjC8=|OQqqxboFIh/377N2Zowb5mf3BlM= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBM7pO/cxdS/WSaaWJ1ZPdnS8F4WC+8LkJVvCZnaKhCZ7EUD+z+Go0Uv3Tc5KomiBDwU5/LyH1dxJDSh7HCaHAj8=" >> ~/.ssh/known_hosts
    - echo "|1|srFMGIUJYliwLud77x10lZeaP84=|xt2VN57X6KsacGPwa2BeUtnJjSQ= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBM7pO/cxdS/WSaaWJ1ZPdnS8F4WC+8LkJVvCZnaKhCZ7EUD+z+Go0Uv3Tc5KomiBDwU5/LyH1dxJDSh7HCaHAj8=" >> ~/.ssh/known_hosts
    # Because the gitlab UI does not allow multiline inputs, the key was encoded
    # with `cat privatekey_filename | base64 | tr "\n" " "`. Take the gitlab CI variable
    # with key STRAWLAB_ORG_SSH_PRIVATE_KEY, save to private SSH key.
    - echo "$STRAWLAB_ORG_SSH_PRIVATE_KEY" | tr " " "\n" | base64 --decode  > ~/.ssh/id_ed25519
    - chmod go-rx ~/.ssh/id_ed25519
    - rsync -az --delete build/latest/ dh_3pakh2@pdx1-shared-a1-23.dreamhost.com:strawlab.org/strand-braid-api-docs/latest
  environment:
    name: strand-braid-api-docs
    url: https://strawlab.org/strand-braid-api-docs/latest
  needs:
    - build-api-docs
  when: manual

# The single `strand-cam` executable supports both the Basler Pylon and Allied
# Vision Vimba backends, selecting one at runtime via `--camera-backend`. Both
# vendor SDKs are loaded dynamically at runtime (Pylon via pylon-shimload, Vimba
# via libloading), so neither SDK is required to build this binary.
strand-cam-binary:
  image: gitlab.strawlab.org:4567/straw/rust-cam/focal-base:0.0.6
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y llvm-dev libclang-dev clang

    - export RUSTFLAGS="-D warnings -C target-cpu=sandybridge"

    - rustc --version

    # Pre-fetch the full dependency graph so the strand-cam build script's nested,
    # offline trunk frontend build finds every package in the cargo cache -- its
    # `cargo metadata` resolves the whole workspace for all platforms (see
    # build-util::trunk_build; same rationale as in check_and_test_workspace).
    - cargo fetch

    - >
      RUSTFLAGS="$RUSTFLAGS -C codegen-units=1"
      NUM_JOBS=2
      cargo build -p strand-cam --bin strand-cam --no-default-features --features "bundle_files checkercal fiducial flydra_feat_detect tracing/release_max_level_debug" --release

    - ldd -v $CI_PROJECT_DIR/target/release/strand-cam
    - $CI_PROJECT_DIR/target/release/strand-cam --version
    - mkdir -p $CI_PROJECT_DIR/build
    - cp $CI_PROJECT_DIR/target/release/strand-cam $CI_PROJECT_DIR/build/
    - cd $CI_PROJECT_DIR
    - cargo build --release -p write-debian-changelog
    - $CI_PROJECT_DIR/target/release/write-debian-changelog strand-cam focal > $CI_PROJECT_DIR/build/strand-cam.changelog
    - cp $CI_PROJECT_DIR/target/release/write-debian-changelog $CI_PROJECT_DIR/build/
  artifacts:
    paths:
      - build/
    name: "strand-cam-binary-${CI_COMMIT_SHA}"

flytrax-csv-to-braidz-binary:
  # Use manylinux project to build binary compatible with old glibc
  image: quay.io/pypa/manylinux2014_x86_64
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - export CARGO_HOME="$CI_PROJECT_DIR/.cargo-proj"
    - curl https://sh.rustup.rs -sSf | sh -s -- --profile minimal -y
    - export PATH="$PATH:$CARGO_HOME/bin"
    - export RUSTFLAGS="-D warnings -C target-cpu=sandybridge"

    - cargo test -p flytrax-csv-to-braidz --release --features "with_apriltags"
    - cargo build -p flytrax-csv-to-braidz --release --features "with_apriltags"

    - mkdir -p build
    - ldd -v target/release/flytrax-csv-to-braidz
    - cp target/release/flytrax-csv-to-braidz build/
  artifacts:
    paths:
      - build/

# The flydratrax GUI build of the multi-backend `strand-cam-gui` executable,
# packaged as `strand-cam-flydratrax`. Like `strand-cam`, it selects the camera
# vendor backend at runtime via `--camera-backend` (defaulting to pylon).
strand-cam-flydratrax-binary:
  image: gitlab.strawlab.org:4567/straw/rust-cam/focal-base:0.0.6
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y llvm-dev libclang-dev clang
    - export RUSTFLAGS="-D warnings -C target-cpu=sandybridge"
    - rustc --version

    # Pre-fetch the full dependency graph so the strand-cam build script's nested,
    # offline trunk frontend build finds every package in the cargo cache -- its
    # `cargo metadata` resolves the whole workspace for all platforms (see
    # build-util::trunk_build; same rationale as in check_and_test_workspace).
    - cargo fetch

    - >
      RUSTFLAGS="$RUSTFLAGS -C codegen-units=1"
      NUM_JOBS=2
      cargo build --no-default-features --features "strand-cam/bundle_files strand-cam/flydratrax strand-cam/checkercal strand-cam/fiducial strand-cam/flydra_feat_detect tracing/release_max_level_debug" --release -p strand-cam-gui

    - ldd -v $CI_PROJECT_DIR/target/release/strand-cam-gui
    - $CI_PROJECT_DIR/target/release/strand-cam-gui --version
    - mkdir -p $CI_PROJECT_DIR/build
    # Rename the target to `strand-cam-flydratrax`.
    - cp $CI_PROJECT_DIR/target/release/strand-cam-gui $CI_PROJECT_DIR/build/strand-cam-flydratrax
    - cd $CI_PROJECT_DIR
    - cargo build --release -p write-debian-changelog
    - $CI_PROJECT_DIR/target/release/write-debian-changelog strand-cam-flydratrax focal > $CI_PROJECT_DIR/build/strand-cam-flydratrax.changelog
    - cat $CI_PROJECT_DIR/build/strand-cam-flydratrax.changelog
  artifacts:
    paths:
      - build/
    name: "strand-cam-flydratrax-linux-${CI_COMMIT_SHA}"

braid-offline-static:
  dependencies: []
  # Use manylinux project to build binary compatible with old glibc
  image: quay.io/pypa/manylinux2014_x86_64
  script:
    - export CARGO_HOME="$CI_PROJECT_DIR/.cargo-proj"
    - curl https://sh.rustup.rs -sSf | sh -s -- --profile minimal -y
    - export PATH="$PATH:$CARGO_HOME/bin"
    - export RUSTFLAGS="-D warnings -C target-cpu=sandybridge"

    - cd $CI_PROJECT_DIR
    - cargo build -p braid-offline --release
    - ldd -v target/release/braid-offline-retrack
    - ldd -v target/release/compute-flydra1-compat

    - mkdir -p $CI_PROJECT_DIR/build
    - cp target/release/braid-offline-retrack $CI_PROJECT_DIR/build/
    - cp target/release/compute-flydra1-compat $CI_PROJECT_DIR/build/
  artifacts:
    paths:
      - build/
    name: "braid-offline-static-${CI_COMMIT_SHA}"

braid-process-video:
  # Build on Ubuntu Focal (20.04) but doesn't link libraries with
  # backward-incompatible ABIs (ssl), so it runs on new Ubuntu, also.
  image: ubuntu:focal
  script:
    - _packaging/setup-ubuntu-apt-proxy.sh
    - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y dpkg-dev debhelper git pkg-config libclang-dev libvpx-dev curl

    - export CARGO_HOME="$CI_PROJECT_DIR/.cargo-proj"
    - curl https://sh.rustup.rs -sSf | sh -s -- --profile minimal -y
    - source $CARGO_HOME/env
    - export RUSTFLAGS="-D warnings -C target-cpu=sandybridge"

    - cargo build --release -p braid-process-video
    - ldd -v target/release/braid-process-video

    - mkdir -p build
    - cp target/release/braid-process-video build/
  artifacts:
    paths:
      - build/
    name: "braid-process-video-${CI_COMMIT_SHA}"

slow-tests:
