[package]
name = "braid_frontend"
version = "1.0.0-rc.2"                       # braid release synchronized
authors = ["Andrew Straw <strawman@astraw.com>"]
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Yew WASM frontend for the Braid multi-camera tracking web UI"

[dependencies]
console_error_panic_hook.workspace = true
anyhow.workspace = true
log.workspace = true
wasm-logger.workspace = true
gloo-events.workspace = true
gloo-timers = "0.3.0"
gloo-utils.workspace = true
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
js-sys.workspace = true
yew.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true

uuid = { workspace = true, features = ["js"] }
yew-tincture.workspace = true

braid-types.workspace = true
strand-cam-bui-types.workspace = true
strand-cam-storetype.workspace = true
strand-bui-backend-session-types.workspace = true
strand-http-video-streaming-types.workspace = true
ads-webasm.workspace = true

[dependencies.web-sys]
workspace = true
features = [
  "CanvasRenderingContext2d",
  "Event",
  "EventSource",
  "Headers",
  "HtmlCanvasElement",
  "HtmlImageElement",
  "HtmlInputElement",
  "MessageEvent",
  "Request",
  "RequestCache",
  "RequestInit",
  "RequestMode",
  "Response",
  "Window",
]
