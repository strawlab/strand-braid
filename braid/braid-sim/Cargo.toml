[package]
name = "braid-sim"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Simulation harness for end-to-end testing of Braid 3D tracking: ground-truth insect trajectories, synthetic calibrations, and projection to fake cameras."

[features]
# The in-process detection injector (src/inject.rs) drives the full flydra2
# tracker, so it is opt-in to keep the default braid-sim build (and the ci2-sim
# backend that depends on it) lightweight.
inprocess = ["dep:flydra2", "dep:tokio", "dep:tokio-stream", "dep:chrono", "dep:tempfile"]

[dependencies]
flydra-mvg.workspace = true
braid-mvg.workspace = true
braid-config-data.workspace = true
braid-types.workspace = true
braidz-parser.workspace = true
cam-geom.workspace = true
opencv-ros-camera.workspace = true
nalgebra.workspace = true
serde = { workspace = true, features = ["std", "derive"] }
toml.workspace = true
eyre.workspace = true
clap = { workspace = true, features = ["derive"] }
# Only used by the optional `inprocess` feature (the in-process injector).
flydra2 = { workspace = true, features = ["bundle_files"], optional = true }
tokio = { workspace = true, optional = true }
tokio-stream = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
tempfile = { workspace = true, optional = true }

[dev-dependencies]
approx.workspace = true
tokio = { workspace = true }
tempfile.workspace = true

[[bin]]
name = "braid-sim"
path = "src/bin/braid-sim.rs"

# The scaling/timing benchmark drives the in-process tracker, so it only builds
# with the `inprocess` feature (which pulls in flydra2 and a tokio runtime).
[[bin]]
name = "braid-sim-bench"
path = "src/bin/braid-sim-bench.rs"
required-features = ["inprocess"]

# The plotter only reads the benchmark CSV and writes SVG, so it builds in the
# default (lightweight) crate — no `inprocess`/flydra2/tokio needed.
[[bin]]
name = "braid-sim-plot"
path = "src/bin/braid-sim-plot.rs"
