# Example simulation scenario for the Braid live 3D test harness (braid-sim).
# This is the single source of truth for a run: the harness derives the camera
# calibration XML and the Braid config from it.

# RNG seed (reserved for stochastic motion / noise in later milestones).
seed = 1
# Synchronized frame rate (frames per second).
fps = 100.0

# Tracking volume (axis-aligned bounding box, meters). ~0.30 m cube.
[arena]
min = [-0.15, -0.15, 0.0]
max = [0.15, 0.15, 0.30]

# Synthetic cameras: an evenly-spaced horizontal ring looking at the arena
# center, ideal pinhole (no distortion).
[cameras]
count = 5
radius_m = 0.6
height_m = 0.7
focal_length_px = 900.0
image_width = 640
image_height = 512

# Insect-as-blob rendering (used by the ci2-sim backend; defaults from the M0
# detector-contract spike).
[blob]
peak = 160
sigma = 1.5
background = 0

# One insect on a smooth, bounded Lissajous path.
[[insects]]
id = 1

[insects.motion]
freq_hz = [0.11, 0.13, 0.07]
phase = [0.0, 1.0, 2.0]
fill = 0.7
