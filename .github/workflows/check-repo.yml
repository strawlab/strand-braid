name: Check source code in repository

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check-readme-updated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test that README.md is up to date
        run: |
          cargo run -p workspace-docs -- --check

  check-cargo-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test that `cargo fmt` is happy
        run: |
          cargo fmt --check

  check-license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test that every .rs file has an SPDX license header
        run: |
          cargo run -p license-check

  check-cargo-compiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust wasm target and trunk
        run: |
          rustup target add wasm32-unknown-unknown
          curl --location --remote-name https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-musl.tar.gz
          tar xzf trunk-x86_64-unknown-linux-musl.tar.gz
          sudo mv trunk /usr/local/bin/
          trunk --version
      # Populate the cargo cache with the FULL dependency graph BEFORE the build.
      # The strand-cam and braid-run build scripts invoke `trunk` to build their
      # Yew/WASM frontends, and that nested cargo runs offline
      # (CARGO_NET_OFFLINE=true) to avoid deadlocking the outer build's package-
      # cache lock (see build-util::trunk_build). Trunk first runs `cargo
      # metadata`, which resolves the whole workspace graph for *every* platform
      # -- including crates gated to other targets (e.g. the macOS-only
      # accesskit_macos pulled in by the GUI stack). Offline, any package missing
      # from the cache aborts that metadata call, so a wasm32-only fetch is not
      # enough. Plain `cargo fetch` downloads the entire graph for all targets.
      - name: Pre-fetch all dependencies (for the offline trunk frontend build)
        run: |
          cargo fetch
      - name: Check that all crates compile
        run: |
          cargo check --workspace --all-targets

  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust wasm target and trunk
        # Needed because some crates (e.g. strand-cam with its default
        # `bundle_files` feature) build a wasm frontend as part of the build.
        run: |
          rustup target add wasm32-unknown-unknown
          curl --location --remote-name https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-musl.tar.gz
          tar xzf trunk-x86_64-unknown-linux-musl.tar.gz
          sudo mv trunk /usr/local/bin/
          trunk --version
      # See the matching note in the check-cargo-compiles job: the strand-cam and
      # braid-run build scripts build their Yew/WASM frontends with a nested cargo
      # that runs offline and first resolves the whole workspace graph via `cargo
      # metadata`, so the entire dependency graph (all platforms) must already be
      # in the cargo cache before any build that triggers those build scripts.
      - name: Pre-fetch all dependencies (for the offline trunk frontend build)
        run: |
          cargo fetch
      # Run the whole workspace's tests with default features. This covers most
      # tests, including the simulation harness (braid-sim, ci2-sim), the
      # blob/detector contract (flydra-feature-detector), and the frame-rate
      # "bunching" unit tests in strand-cam (whose default features include
      # `flydra_feat_detect`): that estimating fps from a bursty host clock
      # over-reads -- the cause of the live-vs-retrack track fragmentation bug --
      # while a hardware timestamp stays correct.
      - name: Workspace tests (default features)
        run: |
          cargo test --release --workspace
      # Layer on tests that need non-default cargo features and so are not built
      # by the default-feature run above. `flydratrax` (single-camera tracking)
      # is not a default feature, so build and test strand-cam with it enabled.
      - name: strand-cam flydratrax-feature tests
        run: |
          cargo test --release -p strand-cam \
            --no-default-features \
            --features "serve_files flydratrax fiducial" \
            --lib
      # The braid-sim in-process detection injector drives the full flydra2
      # tracker and so is behind the non-default `inprocess` feature. This runs
      # the level-B injector tests (synthetic 2D detections -> 3D tracks scored
      # against ground truth), which the default-feature run above skips.
      - name: braid-sim in-process injector tests
        run: |
          cargo test --release -p braid-sim --features inprocess
