name: Build braid-process-video app

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  braid-process-video-app:
    strategy:
      matrix:
        runs-on: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
      - name: Build braid-process-video app
        run: |
          cargo build --release -p braid-process-video
      - name: Generate THIRD-PARTY-LICENSES
        working-directory: braid/braid-process-video
        run: |
          cargo install cargo-bundle-licenses --locked
          cargo bundle-licenses --format yaml --prefer MIT --output "$GITHUB_WORKSPACE/target/release/THIRD-PARTY-LICENSES.yml"
        shell: bash
      - uses: actions/upload-artifact@v6
        with:
          name: braid-process-video-${{ matrix.runs-on }}
          path: |
            ${{ github.workspace }}/target/release/braid-process-vid*
            ${{ github.workspace }}/target/release/THIRD-PARTY-LICENSES.yml
