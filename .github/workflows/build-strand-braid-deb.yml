name: Build strand-braid Debian packages

# Build a strand-braid .deb for each supported Ubuntu version, so that release
# artifacts can be built and published directly from GitHub.
#
# Two jobs share one packaging implementation (the
# .github/actions/package-strand-braid-deb composite action); they differ only
# in how the build environment is provisioned:
#
#   * strand-braid-deb         - builds natively on GitHub-hosted runners, for
#                                the Ubuntu versions GitHub provides runners for
#                                (currently 22.04 and 24.04).
#   * strand-braid-deb-container - builds inside an `ubuntu:<codename>` Docker
#                                container, for the Ubuntu versions that have no
#                                hosted runner (20.04, retired; and 26.04, the
#                                new LTS not yet offered as a runner). Building
#                                inside the target distro's container yields
#                                binaries linked against that distro's glibc and
#                                lets dpkg-shlibdeps compute per-distro
#                                dependencies -- the same model the GitLab CI
#                                uses, where the runner *is* the container.
#
# The proprietary camera SDKs (Basler Pylon, Allied Vision Vimba) are loaded at
# runtime via dlopen, so they are not needed to build or package these binaries.
# Only the small public Pylon C-ABI shim is downloaded (in the composite action).

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

jobs:
  # Native builds on GitHub-hosted runners.
  strand-braid-deb:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-22.04
            ubuntu-version: "2204"
          - runs-on: ubuntu-24.04
            ubuntu-version: "2404"
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # The Debian packaging infrastructure needs the .so files available so that
      # dpkg-shlibdeps can automatically determine package dependencies. The list
      # is a superset of what is strictly required (it includes the build
      # dependencies from _packaging/setup-ubuntu-base.sh).
      - name: Install build dependencies
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            dpkg-dev debhelper libudev-dev zlib1g-dev pkg-config curl \
            build-essential git libvpx-dev clang libclang-dev llvm-dev zip cmake

      - name: Install Rust wasm target and trunk
        run: |
          rustup target add wasm32-unknown-unknown
          curl --location --remote-name https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-musl.tar.gz
          tar xzf trunk-x86_64-unknown-linux-musl.tar.gz
          sudo mv trunk /usr/local/bin/
          trunk --version

      - name: Build, package, and publish .deb
        uses: ./.github/actions/package-strand-braid-deb
        with:
          ubuntu-version: ${{ matrix.ubuntu-version }}

  # Containerized builds for Ubuntu versions that have no GitHub-hosted runner.
  strand-braid-deb-container:
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:focal
            ubuntu-version: "2004"
          - image: ubuntu:resolute
            ubuntu-version: "2604"
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    steps:
      # git must be present before actions/checkout runs, otherwise checkout
      # silently falls back to a REST-API download that omits submodules. (The
      # plain ubuntu:* images ship no git.)
      - name: Install git for checkout
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y git

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Plain ubuntu:* images carry no toolchain, so unlike the native job we
      # install the build dependencies, Rust, the wasm target, and trunk here.
      # We run as root inside the container, so no sudo. The package list mirrors
      # the native job (dpkg-shlibdeps needs the .so files to resolve deps).
      - name: Install build dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            dpkg-dev debhelper libudev-dev zlib1g-dev pkg-config curl \
            build-essential git libvpx-dev clang libclang-dev llvm-dev zip cmake cpio

      - name: Install Rust toolchain, wasm target, and trunk
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustc --version
          rustup target add wasm32-unknown-unknown
          curl --location --remote-name https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-musl.tar.gz
          tar xzf trunk-x86_64-unknown-linux-musl.tar.gz
          mv trunk "$HOME/.cargo/bin/"
          trunk --version

      - name: Build, package, and publish .deb
        uses: ./.github/actions/package-strand-braid-deb
        with:
          ubuntu-version: ${{ matrix.ubuntu-version }}
